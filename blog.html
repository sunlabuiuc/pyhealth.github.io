<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PyHealth Roadmap</title>
  <meta name="description" content="What the PyHealth community is currently building — upcoming features and extensions on the roadmap.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    /* ── Hero ── */
    .ph-hero {
      background: linear-gradient(140deg, #1c2b3a 0%, #28425e 60%, #1e3348 100%);
      border-radius: 16px;
      padding: 3rem 2.4rem 2.8rem;
      color: white;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 20px 48px rgba(22, 33, 31, 0.18);
      animation: rise 420ms ease;
    }
    .ph-hero::before {
      content: "";
      position: absolute;
      top: -80px; right: -80px;
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,95,38,0.22) 0%, transparent 70%);
      pointer-events: none;
    }
    .ph-hero::after {
      content: "";
      position: absolute;
      bottom: -100px; left: -60px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(90,160,230,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .ph-eyebrow {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(201,95,38,0.9);
      margin: 0 0 0.6rem;
    }
    .ph-hero h1 {
      color: white;
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      margin: 0 0 0.5rem;
      letter-spacing: -0.01em;
    }
    .ph-tagline {
      color: rgba(255,255,255,0.72);
      font-size: 1.05rem;
      line-height: 1.55;
      max-width: 620px;
      margin: 0 0 1.8rem;
    }
    .ph-cta-row {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .ph-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      border-radius: 10px;
      padding: 0.64rem 1.15rem;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: "IBM Plex Sans", sans-serif;
      transition: filter 0.15s, transform 0.1s;
    }
    .ph-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .ph-btn.primary {
      background: var(--accent);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 12px rgba(201,95,38,0.35);
    }
    .ph-btn.outline {
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(6px);
    }

    /* ── Back nav ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.94rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
    }
    .back-link:hover {
      color: var(--accent);
      border-color: var(--line);
      background: var(--paper);
    }

    /* ── Roadmap table ── */
    .roadmap-section {
      margin-top: 2rem;
      animation: rise 500ms ease;
    }
    .roadmap-table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid var(--line);
      box-shadow: 0 4px 16px rgba(22,33,31,0.06);
    }
    .roadmap-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--paper);
      font-size: 0.97rem;
    }
    .roadmap-table thead tr {
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }
    .roadmap-table th {
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      padding: 0.85rem 1.4rem;
    }
    .roadmap-table td {
      padding: 1.1rem 1.4rem;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
      line-height: 1.55;
    }
    .roadmap-table tbody tr:last-child td {
      border-bottom: none;
    }
    .roadmap-table tbody tr:hover td {
      background: color-mix(in srgb, var(--accent-soft) 30%, transparent);
    }
    .feature-name {
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
    }
    .feature-desc {
      color: var(--muted);
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      background: rgba(74,222,128,0.12);
      color: #16a34a;
      white-space: nowrap;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 0 2px rgba(74,222,128,0.3);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 2px rgba(74,222,128,0.3); }
      50% { box-shadow: 0 0 0 5px rgba(74,222,128,0.1); }
    }

    .contribute-callout {
      margin-top: 2rem;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1.5rem 1.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      animation: rise 560ms ease;
    }
    .contribute-callout p {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .contribute-callout h3 {
      margin: 0;
      font-size: 1.1rem;
    }
    .callout-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      text-decoration: none;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 0.6rem 1.1rem;
      font-size: 0.93rem;
      font-weight: 500;
      font-family: "IBM Plex Sans", sans-serif;
      white-space: nowrap;
      transition: filter 0.15s, transform 0.1s;
    }
    .callout-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  </style>
</head>

  <header class="site-header">
    <div class="site-wrap header-inner">
      <nav class="nav" aria-label="Main navigation">
        <a href="index.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          PyHealth
        </a>
      </nav>
      <span style="color: var(--muted); font-size: 0.88rem; font-weight: 500;">Blog Posts</span>
    </div>
  </header>

</html>
