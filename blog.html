<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
      body {
        background: var(--bg);
        color: var(--ink);
      }
      .site-wrap {
        width: min(100% - 2rem, var(--maxw));
        margin: 0 auto;
        padding: 2rem 0 3rem;
      }
      .blog-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 2rem 2.1rem;
        box-shadow: 0 20px 42px rgba(22, 33, 31, 0.08);
      }
      .blog-title {
        font-family: "Source Serif 4", Georgia, serif;
        font-size: clamp(2.1rem, 4vw, 3.6rem);
        margin: 0 0 0.45rem;
        line-height: 1.05;
      }
      .blog-meta {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 0.9rem;
        align-items: center;
      }
      .blog-meta span {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }
      .blog-content p.blog-updated {
        margin: -0.4rem 0 1.4rem;
        font-size: 0.88rem;
        color: var(--muted);
        font-style: italic;
      }
      .blog-content {
        display: grid;
        gap: 1.25rem;
      }
      .blog-content p,
      .blog-content ul,
      .blog-content ol,
      .blog-content blockquote,
      .blog-content pre,
      .blog-content figure {
        margin: 0;
      }
      .blog-content p + p {
        margin-top: 0.8rem;
      }
      .blog-content h2,
      .blog-content h3 {
        margin: 0.7rem 0 0.35rem;
      }
      .blog-content h2 + p,
      .blog-content h3 + p {
        margin-top: 0.35rem;
      }
      .blog-content ul,
      .blog-content ol {
        padding-left: 1.3rem;
        margin: 0.7rem 0;
      }
      .blog-content li {
        margin: 0.28rem 0;
      }
      .blog-content blockquote {
        margin: 1.5rem 0;
        padding: 1.2rem 1.2rem 1.2rem 1.1rem;
        border-left: 4px solid var(--accent);
        background: rgba(201, 95, 38, 0.08);
        color: var(--ink);
      }
      .blog-content pre {
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 16px;
        padding: 1.3rem 1.2rem;
        overflow-x: auto;
        border: 1px solid rgba(148, 163, 184, 0.18);
      }
      .blog-content pre code {
        display: block;
        background: transparent;
        color: inherit;
        padding: 0;
        margin: 0;
        border-radius: 0;
        white-space: pre;
      }
      .blog-content code {
        background: transparent;
        color: #7c3aed;
        font-weight: 500;
        border-radius: 6px;
        padding: 0.08rem 0.18rem;
      }
      .blog-content .code-keyword {
        color: #7c3aed;
        font-weight: 600;
      }
      .blog-content .code-string {
        color: #f59e0b;
      }
      .blog-content .code-comment {
        color: #94a3b8;
        font-style: normal;
      }
      .blog-content .code-number {
        color: #38bdf8;
      }
      .blog-content img {
        width: 100%;
        max-width: 100%;
        border-radius: 16px;
        margin: 1.5rem 0;
        display: block;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        text-decoration: none;
        color: var(--muted);
        font-size: 0.94rem;
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        border: 1px solid transparent;
        transition: color 0.12s, background 0.12s, border-color 0.12s;
        margin-bottom: 1.5rem;
      }
      .back-link:hover {
        color: var(--accent);
        border-color: var(--line);
        background: var(--paper);
      }
      @media (max-width: 720px) {
        .blog-card { padding: 1.5rem 1.4rem; }
        .site-wrap { padding: 1rem 0 2rem; }
      }
    </style>
</head>
<body>
  <div class="site-wrap">
    <a href="blog_list.html" class="back-link">← Back to Blog List</a>
    <article class="blog-card">
      <div id="blog-content" class="blog-content">Loading...</div>
    </article>
  </div>

    <script>
    function parseFrontmatter(text) {
      text = text.replace(/\r/g, '');
      const match = text.match(/^---\s*$([\s\S]*?)^---\s*$/m);
      if (!match) {
        return { meta: {}, body: text };
      }

      const meta = {};
      match[1].split('\n').forEach(line => {
        const field = line.match(/^(title|author):\s*(.*)$/i);
        if (field) {
          meta[field[1].toLowerCase()] = field[2].trim().replace(/^['"]|['"]$/g, '');
        }
      });

      return {
        meta,
        body: text.slice(match[0].length).replace(/^\s+/, '')
      };
    }

    function formatUpdated(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function convertMarkdownBlockquotes(text) {
      text = text.replace(/\r/g, '');
      return text.replace(/(^|\n)((?:>.*(?:\n|$))+)/g, (match, prefix, block) => {
        const lines = block.trimEnd().split('\n');
        let html = prefix;
        let currentLevel = 0;

        lines.forEach((line, index) => {
          const match = line.match(/^(>+)\s?(.*)$/);
          if (!match) {
            return;
          }

          const level = match[1].length;
          const content = match[2];

          while (currentLevel < level) {
            html += '<blockquote>';
            currentLevel += 1;
          }
          while (currentLevel > level) {
            html += '</blockquote>';
            currentLevel -= 1;
          }

          html += content;
          if (index < lines.length - 1) {
            html += '\n';
          }
        });

        while (currentLevel > 0) {
          html += '</blockquote>';
          currentLevel -= 1;
        }

        return html;
      });
    }

    function highlightCodeSyntax(text) {
      const keywords = ['const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while', 'switch', 'case', 'break', 'continue', 'new', 'async', 'await', 'class', 'import', 'from', 'export', 'default', 'try', 'catch', 'throw', 'null', 'true', 'false', 'typeof', 'instanceof'];
      const keywordsRegex = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'g');

      return text.replace(/```([\s\S]*?)```/g, (match, code) => {
        const escapedCode = escapeHtml(code);
        const highlighted = escapedCode
          .replace(keywordsRegex, '<span class="code-keyword">$1</span>');
        return `<pre><code>${highlighted}</code></pre>`;
      });
    }

    function convertMarkdownLists(text) {
      text = text.replace(/\r/g, '');
      return text.replace(/(^|\n)((?:[ \t]*(?:[-*]|\d+\.) .+(?:\n|$))+)/g, (match, prefix, listBlock) => {
        const lines = listBlock.replace(/\t/g, '    ').split('\n').filter(line => line.trim().length > 0);
        let html = prefix;
        const stack = [];

        const closeToDepth = (depth) => {
          while (stack.length > depth) {
            const current = stack.pop();
            if (current.openItem) {
              html += '</li>';
              current.openItem = false;
            }
            html += `</${current.tag}>`;
          }
        };

        const openList = (tag) => {
          html += `<${tag}>`;
          stack.push({ tag, openItem: false });
        };

        const openListItem = (content) => {
          const current = stack[stack.length - 1];
          if (current.openItem) {
            html += '</li>';
            current.openItem = false;
          }
          html += `<li>${content}`;
          current.openItem = true;
        };

        lines.forEach(line => {
          const unordered = line.match(/^(\s*)[-*]\s+(.*)$/);
          const ordered = line.match(/^(\s*)(\d+)\.\s+(.*)$/);
          if (!unordered && !ordered) {
            return;
          }

          const indent = (unordered ? unordered[1].length : ordered[1].length);
          const level = indent === 0 ? 0 : Math.ceil(indent / 4);
          const depth = level + 1;
          const tag = ordered ? 'ol' : 'ul';
          let content = ordered ? ordered[3] : unordered[2];

          const taskMatch = content.match(/^\[([ xX])\]\s+(.*)$/);
          if (taskMatch) {
            const checked = taskMatch[1].toLowerCase() === 'x';
            content = `<label><input type="checkbox" disabled${checked ? ' checked' : ''}> ${taskMatch[2].trim()}</label>`;
          }

          if (stack.length < depth) {
            openList(tag);
          } else if (stack.length > depth) {
            closeToDepth(depth);
          }

          if (stack[stack.length - 1].tag !== tag) {
            closeToDepth(depth - 1);
            openList(tag);
          }

          openListItem(content.trim());
        });

        closeToDepth(0);
        return html;
      });
    }

        // Get the blog post name from the URL
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('post');

        let blogMeta = null;

        if (!postId) {
            document.getElementById('blog-content').innerHTML = 'No post specified';
        } else {
            // Fetch blogs.json to find the markdown filename
            fetch('data/blogs.json')
                .then(response => response.json())
                .then(blogs => {
                    const blog = blogs.find(b => b.id === postId);
                    if (!blog) {
                        document.getElementById('blog-content').innerHTML = 'Post not found';
                        return;
                    }
                    blogMeta = blog;
                    // Fetch the markdown file from the blog folder
                    return fetch(`blogs/${postId}/${blog.file}`);
                })
                .then(response => response.text())
            .then(text => {
              const { meta, body } = parseFrontmatter(text);
              let html = body.replace(/\r/g, '');

                    // Simple markdown to HTML converter
                    // Headers
                    html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
                    html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
                    html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

                    // Code blocks
                    html = highlightCodeSyntax(html);

                    // Blockquotes
                    html = convertMarkdownBlockquotes(html);

                    // Lists
                    html = convertMarkdownLists(html);

                    // Strikethrough
                    html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');

                    // Bold and italic
                    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

                    // Images - update paths to include blog folder and support shared images/ references
                    html = html.replace(/!\[(.*?)\]\((.*?)\)/g, (match, alt, src) => {
                        let imageSrc;
                        if (src.startsWith('/') || src.startsWith('http')) {
                          imageSrc = src;
                        } else if (/^\.\.\/images\//.test(src)) {
                          imageSrc = src.replace(/^\.\.\//, '');
                        } else {
                          imageSrc = new URL(src, `${location.origin}/blogs/${postId}/`).pathname.replace(/^\//, '');
                        }
                        return `<img src="${imageSrc}" alt="${alt}">`;
                    });

                    // Links
                    html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>');

                    // Inline code
                    html = html.replace(/`(.*?)`/g, '<code>$1</code>');

                    // Preserve raw HTML and pre blocks while wrapping paragraphs
                    const placeholders = [];
                    const preserveBlock = (pattern, tag, normalize = block => block) => {
                      html = html.replace(new RegExp(pattern, 'gi'), block => {
                        const index = placeholders.length;
                        placeholders.push({ block: normalize(block), tag });
                        return `<${tag} data-raw-block-index="${index}"></${tag}>`;
                      });
                    };
                    preserveBlock('<pre>[\s\S]*?<\/pre>', 'pre');
                    preserveBlock('<blockquote>[\s\S]*?<\/blockquote>', 'blockquote', block => block.replace(/\n{2,}/g, '\n'));
                    preserveBlock('<details>[\s\S]*?<\/details>', 'details', block => block.replace(/\n{2,}/g, '\n'));

                    // Paragraphs
                    html = html.split(/\n{2,}/).map(para => para.trim()).filter(Boolean).map(para => {
                      const trimmed = para.trim();
                      if (/^(<(?:h[1-3]|ul|ol|blockquote|pre|img|details|summary|figure|div|table|section|aside))/i.test(trimmed)) {
                        return trimmed;
                      }
                      return `<p>${trimmed}</p>`;
                    }).join('');

                    placeholders.forEach(({ block, tag }, index) => {
                      const placeholder = `<${tag} data-raw-block-index="${index}"></${tag}>`;
                      html = html.split(placeholder).join(block);
                    });
                    html = html.replace(/<p>\s*(<img[\s\S]*?)>\s*<\/p>/gi, '<img$1>');
                    html = html.replace(/<p>\s*<figure[\s\S]*?<\/figure>\s*<\/p>/gi, m => m.replace(/^<p>\s*/i, '').replace(/\s*<\/p>$/i, ''));
                    html = html.replace(/<p>(<blockquote>[\s\S]*?<\/blockquote>)<\/p>/g, '$1');
                    html = html.replace(/<p>(<ul>[\s\S]*?<\/ul>)<\/p>/g, '$1');
                    html = html.replace(/<p>(<ol>[\s\S]*?<\/ol>)<\/p>/g, '$1');
                    html = html.replace(/<p>(<pre>[\s\S]*?<\/pre>)<\/p>/g, '$1');
                    html = html.replace(/<p>\s*<h([1-3])>([\s\S]*?)<\/h\1>\s*<\/p>/g, '<h$1>$2</h$1>');
                    html = html.replace(/<p>\s*<\/p>/g, '');

                    const authorLine = meta.author ? `<div class="blog-meta"><span>By ${escapeHtml(meta.author)}</span></div>` : '';
                    const titleLine = meta.title ? `<h1 class="blog-title">${escapeHtml(meta.title)}</h1>` : '';
                    const updatedAbs = blogMeta && blogMeta.last_updated ? formatUpdated(blogMeta.last_updated) : '';
                    const updatedLine = updatedAbs ? `<p class="blog-updated" title="${escapeHtml(blogMeta.last_updated)}">Last updated on ${updatedAbs}</p>` : '';

                    document.getElementById('blog-content').innerHTML = `${titleLine}${authorLine}${updatedLine}${html}`;
                })
                .catch(err => {
                    document.getElementById('blog-content').innerHTML = 'Post not found';
                    console.error(err);
                });
        }
    </script>
</body>
</html>
